name: Configure SDLC labels

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/bootstrap-github.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SDLC_APPROVERS: ${{ vars.SDLC_APPROVERS }}
