name: Promote approved DEV PR to PROD

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request from dev to main
        required: true
        type: string
      head_sha:
        description: Exact reviewed PR head SHA
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  merge:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/promote.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.SDLC_GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
          EXPECTED_SHA: ${{ inputs.head_sha }}
          PROMOTION_TARGET: prod
          SDLC_REQUIRED_CHECKS: ${{ vars.SDLC_REQUIRED_CHECKS || 'test' }}
